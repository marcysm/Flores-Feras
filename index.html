<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <meta
    name="description"
    content="Arquivo Artist Valley — experiência narrativa interativa em Adventure Text."
  >

  <meta
    name="theme-color"
    content="#030303"
  >

  <title>Arquivo Artist Valley</title>

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>
  <noscript>
    <div class="loading-screen">
      <div class="loading-screen__content">
        <p>
          ESTE ARQUIVO PRECISA DO JAVASCRIPT ATIVADO PARA FUNCIONAR.
        </p>
      </div>
    </div>
  </noscript>

  <div
    id="loading-screen"
    class="loading-screen"
    role="status"
    aria-live="polite"
    aria-busy="true"
  >
    <div class="loading-screen__content">
      <span
        class="loading-screen__light"
        aria-hidden="true"
      ></span>

      <p id="loading-message">
        INICIALIZANDO ARQUIVO...
      </p>
    </div>
  </div>

  <main
    id="application"
    class="application is-hidden"
  >
    <header class="topbar">
      <div class="topbar__identity">
        <span
          id="connection-light"
          class="connection-light"
          aria-hidden="true"
        ></span>

        <div>
          <p class="topbar__label">
            IDENTIFICAÇÃO
          </p>

          <p
            id="player-code"
            class="topbar__value"
          >
            DESCONHECIDA
          </p>
        </div>
      </div>

      <div class="topbar__route">
        <p class="topbar__label">
          ROTA
        </p>

        <p
          id="route-name"
          class="topbar__value"
        >
          NÃO DEFINIDA
        </p>
      </div>
    </header>

    <section
      class="terminal"
      aria-labelledby="game-title"
    >
      <div
        class="terminal__scanlines"
        aria-hidden="true"
      ></div>

      <div class="terminal__header">
        <p
          id="game-title"
          class="terminal__archive"
        >
          ARQUIVO ARTIST VALLEY
        </p>

        <button
          id="menu-button"
          class="terminal__menu-button"
          type="button"
          aria-label="Abrir lista de comandos"
          aria-haspopup="dialog"
          aria-controls="command-modal"
        >
          COMANDOS
        </button>
      </div>

      <article
        id="scene-container"
        class="scene-container"
        aria-live="polite"
        aria-atomic="false"
      >
        <p class="system-line">
          Aguardando conteúdo...
        </p>
      </article>

      <div
        id="system-message"
        class="system-message"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <form
        id="command-form"
        class="command-form"
        autocomplete="off"
      >
        <label
          class="command-form__label"
          for="command-input"
        >
          O QUE VOCÊ FAZ?
        </label>

        <div class="command-form__row">
          <span
            class="command-form__prompt"
            aria-hidden="true"
          >
            &gt;
          </span>

          <input
            id="command-input"
            class="command-form__input"
            type="text"
            name="command"
            maxlength="300"
            autocomplete="off"
            autocapitalize="sentences"
            spellcheck="true"
            enterkeyhint="send"
            placeholder="DIGITE UMA AÇÃO..."
            aria-describedby="command-help"
          >

          <button
            id="send-button"
            class="command-form__send"
            type="submit"
          >
            ENVIAR
          </button>
        </div>

        <p
          id="command-help"
          class="command-form__help"
        >
          Descreva uma ação ou abra a lista de comandos do terminal.
        </p>
      </form>
    </section>
  </main>

  <div
    id="command-modal"
    class="modal is-hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="command-modal-title"
  >
    <div
      class="modal__backdrop"
      data-close-modal
      aria-hidden="true"
    ></div>

    <section
      class="modal__panel"
      tabindex="-1"
    >
      <div class="modal__header">
        <div>
          <p class="modal__eyebrow">
            TERMINAL DE CONSULTA
          </p>

          <h2 id="command-modal-title">
            Comandos
          </h2>
        </div>

        <button
          class="modal__close"
          type="button"
          data-close-modal
          aria-label="Fechar lista de comandos"
        >
          ×
        </button>
      </div>

      <div class="command-list">
        <button
          type="button"
          data-command="ajuda"
        >
          <strong>AJUDA</strong>
          <span>Consulta orientações disponíveis para a Cena atual.</span>
        </button>

        <button
          type="button"
          data-command="repetir"
        >
          <strong>REPETIR</strong>
          <span>Repete a última resposta apropriada do arquivo.</span>
        </button>

        <button
          type="button"
          data-command="inventario"
        >
          <strong>INVENTÁRIO</strong>
          <span>Consulta os objetos guardados no progresso atual.</span>
        </button>

        <button
          type="button"
          data-command="historico"
        >
          <strong>HISTÓRICO</strong>
          <span>Mostra os acontecimentos registrados recentemente.</span>
        </button>

        <button
          type="button"
          data-command="mapa"
        >
          <strong>MAPA</strong>
          <span>Consulta os locais descobertos durante a história.</span>
        </button>
      </div>
    </section>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
